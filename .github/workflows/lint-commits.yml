name: Lint Commits

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Lint commits
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: >-
          npx --yes -p @commitlint/cli@21.2.0 -p @commitlint/config-conventional@21.2.0
          commitlint --extends @commitlint/config-conventional --from "$BASE_SHA" --to "$HEAD_SHA" --verbose
